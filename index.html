<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--gold:#FFD700;--gold2:#C8960C;--dark:#0a0a0e;--card:#111118;--card2:#1a1a24}
body{background:var(--dark);color:#e8e0d0;font-family:'Cormorant Garamond',serif;min-height:100dvh;overflow-x:hidden;padding-bottom:80px}
/* STELLE */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,#1a1a2e 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,#16213e 0%,transparent 60%);pointer-events:none;z-index:0}
/* HEADER */
.header{text-align:center;padding:28px 16px 16px;position:relative;z-index:1}
.crown{font-size:52px;animation:float 3s ease-in-out infinite;display:block;margin-bottom:4px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.title{font-family:'Cinzel',serif;font-size:clamp(22px,7vw,34px);font-weight:900;letter-spacing:.15em;background:linear-gradient(135deg,#b8860b,#FFD700,#fff8dc,#FFD700,#b8860b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;background-size:300%}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
.subtitle{font-size:13px;letter-spacing:.3em;color:#8a7a5a;margin-top:2px}
.divider{display:flex;align-items:center;gap:12px;margin:12px 16px 0;opacity:.4}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gold)}
.divider-star{color:var(--gold);font-size:16px}
/* AGGIORNAMENTO */
.updated{text-align:center;font-size:11px;color:#5a4a2a;letter-spacing:.1em;padding:6px 0;position:relative;z-index:1}
/* TABS */
.tabs{display:flex;justify-content:space-around;background:#0d0d15;border-top:1px solid #2a2a3a;position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.08em;color:#5a5a7a;transition:.2s;border:none;background:none}
.tab.active{color:var(--gold)}
.tab-ico{font-size:20px;display:block;margin-bottom:2px}
/* SEZIONI */
.section{display:none;padding:0 12px;position:relative;z-index:1}
.section.active{display:block}
/* CARD */
.card{background:var(--card);border:1px solid #2a2520;border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:var(--gold);text-align:center;margin-bottom:12px}
/* I NOSTRI NUMERI */
.our-balls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:8px 0}
/* PALLINE */
.ball{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:14px;font-weight:700;cursor:default;transition:transform .2s}
.ball.gold{background:radial-gradient(circle at 35% 35%,#fff5a0,#FFD700 40%,#b8860b 80%);color:#3a2000;box-shadow:0 0 12px #FFD70066;animation:pulse 1.5s ease-in-out infinite}
.ball.dimmed{background:#222;color:#ccc;border:1px solid #333}
.ball.dark{background:#1a1a2e;color:#7070a0;border:1px solid #2a2a4a}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}.ball.gold{animation-delay:calc(var(--i)*.15s)}
/* ESTRAZIONE CARD */
.draw-card{background:var(--card);border:1px solid #2a2520;border-radius:14px;padding:14px;margin-bottom:10px;transition:.2s}
.draw-card.has-win{border-color:#FFD70044;background:linear-gradient(135deg,#111118,#1a1508)}
.draw-date{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.draw-date-txt{font-family:'Cinzel',serif;font-size:11px;color:#8a7a5a;letter-spacing:.1em}

.win-badge.terno{background:#2a2a1a;color:#FFD700;border:1px solid #4a4a1a}

.jolly-label,.ss-label{font-size:10px;color:#5a5a7a;letter-spacing:.1em}
.ball-jolly{width:30px;height:30px;border-radius:50%;background:#1a1a3a;border:1px solid #3a3a6a;color:#6a6ab0;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif}
.ball-ss{width:30px;height:30px;border-radius:50%;background:#2a1a00;border:1px solid #5a3a00;color:#9a6a00;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif}
.win-detail{text-align:center;margin-top:8px;font-size:11px;color:#6a6a4a;letter-spacing:.05em}

.history-filter{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px}
.filter-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid #2a2520;background:var(--card);color:#5a5a7a;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;cursor:pointer}
.filter-btn.active{border-color:var(--gold);color:var(--gold)}
/* STATISTICHE */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:var(--card2);border:1px solid #2a2520;border-radius:12px;padding:12px;text-align:center}
.stat-num{font-family:'Cinzel',serif;font-size:26px;font-weight:700;color:var(--gold)}
.stat-label{font-size:10px;color:#5a5a7a;letter-spacing:.1em;margin-top:4px}
.stat-box.highlight{border-color:#FFD70033;background:linear-gradient(135deg,#111118,#1a1508)}
/* PRIZE TABLE */
.prize-table{width:100%;border-collapse:collapse;font-size:12px}
.prize-table th{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;color:#5a5a7a;padding:6px 4px;text-align:center;border-bottom:1px solid #2a2520}
.prize-table td{padding:8px 4px;text-align:center;border-bottom:1px solid #1a1a24}
.prize-table tr.won td{color:var(--gold);background:#1a1500}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-family:'Cinzel',serif;font-size:10px}

.saldo-num.pos{color:#4aff6a}
.saldo-num.neg{color:#ff4a4a}
.saldo-sub{display:flex;justify-content:space-around;margin-top:12px}
.saldo-sub-item{text-align:center}
.saldo-sub-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;color:#5a5a7a}
.saldo-sub-val{font-size:18px;font-weight:700;margin-top:2px}
.saldo-sub-val.ent{color:#4aff6a}
.saldo-sub-val.usc{color:#ff6a6a}

.fc-type-btn.sel-win{background:#0d200d;border-color:#2a5a2a;color:#4aff6a}
.fc-type-btn.sel-exp{background:#200d0d;border-color:#5a2a2a;color:#ff6a6a}
.fc-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fc-input{background:#0d0d15;border:1px solid #2a2520;border-radius:10px;padding:10px 12px;color:#e8e0d0;font-family:'Cormorant Garamond',serif;font-size:16px;width:100%}
.fc-input::placeholder{color:#3a3a5a}
.fc-btn{width:100%;padding:12px;border-radius:24px;border:none;background:linear-gradient(135deg,#b8860b,#FFD700);color:#0a0800;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.2em;font-weight:700;cursor:pointer}

.move-item{background:var(--card);border:1px solid #2a2520;border-radius:12px;padding:12px;margin-bottom:8px}
.move-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.move-desc{font-size:14px;color:#c8b89a;flex:1;padding-right:8px}
.move-amt{font-family:'Cinzel',serif;font-size:16px;font-weight:700;white-space:nowrap}
.move-amt.pos{color:#4aff6a}
.move-amt.neg{color:#ff6a6a}
.move-date{font-size:10px;color:#3a3a5a;margin-bottom:6px}

.move-actions{display:flex;gap:6px}

.modal.open{display:flex}
.modal-box{background:#111118;border:1px solid #2a2520;border-radius:16px;padding:20px;width:100%;max-width:380px}
.modal-title{font-family:'Cinzel',serif;font-size:14px;letter-spacing:.15em;color:var(--gold);margin-bottom:14px;text-align:center}

.sec-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:var(--gold);margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.sec-title::before,.sec-title::after{content:'✦';opacity:.5;font-size:8px}

.bar-lbl{flex:1;text-align:center;font-size:8px;color:#5a5a7a}

          return d;
        });
        document.getElementById('updatedTxt').textContent = j.updated ? 'Aggiornato: '+new Date(j.updated).toLocaleString('it-IT') : '';
      }
    }
  } catch(e) {}
  allDraws = draws;
  renderAll();
}

function renderAll() {
  renderOurBalls();
  renderDraws(allDraws.slice(0,5));
  renderHistory(allDraws);
  renderStats();
  renderFc();
}

// ── PALLINE ───────────────────────────────────────────────────────────────
function ballHtml(n, drawNums, size='md') {
  const cls = size==='sm'?'ball-sm':'ball';
  const inDraw = drawNums ? drawNums.includes(n) : false;
  const isOurs = OUR.includes(n);
  let style='';
  if(drawNums) {
    if(inDraw && isOurs) style='background:radial-gradient(circle at 35% 35%,#fff5a0,#FFD700 40%,#b8860b 80%);color:#3a2000;box-shadow:0 0 10px #FFD70066';
    else if(inDraw) style='background:#222;color:#ccc;border:1px solid #333';
    else if(isOurs) style='background:#1a1a2e;color:#7070a0;border:1px solid #2a2a4a';
    else style='background:#1a1a2e;color:#5a5a7a;border:1px solid #1a1a24';
  } else {
    style='background:radial-gradient(circle at 35% 35%,#fff5a0,#FFD700 40%,#b8860b 80%);color:#3a2000;box-shadow:0 0 8px #FFD70044';
  }
  return `<div class="${cls}" style="${style}">${n}</div>`;
}

function renderOurBalls() {
  document.getElementById('ourBalls').innerHTML = OUR.map(n=>ballHtml(n,null)).join('');
}

// ── ESTRAZIONI RECENTI ────────────────────────────────────────────────────
function winBadge(d) {
  const w=d.wins||calcWins(d.numbers);
  if(w[6]>0) return `<span class="win-badge quaterna">🏆 SEI!</span>`;
  if(w[5]>0) return `<span class="win-badge quaterna">⭐ CINQUINA!</span>`;
  if(w[4]>0) return `<span class="win-badge quaterna">🎯 QUATERNA!</span>`;
  if(w[3]>0) return `<span class="win-badge terno">✨ TERNO!</span>`;
  if(w[2]>0) return `<span class="win-badge ambo">🎯 AMBO!</span>`;
  return `<span class="win-badge nothing">nessuna vincita</span>`;
}

function winDetail(d) {
  const w=d.wins||calcWins(d.numbers);
  const parts=[];
  for(const [k,v] of Object.entries(w)) {
    if(v>0) {
      // scala a 15/28
      const n15 = Math.round(v*15/28);
      const prize = n15 * QUOTE[parseInt(k)];
      parts.push(`${v} ambi (sistema completo) → ~${n15} su 15 giocate → ${fmt(prize)}`);
    }
  }
  if(!parts.length) return '';
  return `<div class="win-detail">${parts.join('<br>')}</div>`;
}

function drawCardHtml(d) {
  const w=d.wins||calcWins(d.numbers);
  const hasWin = Object.values(w).some(v=>v>0);
  const balls = d.numbers.map(n=>ballHtml(n,d.numbers,'sm')).join('');
  return `<div class="draw-card ${hasWin?'has-win':''}">
    <div class="draw-date">
      <div class="draw-date-txt">${d.date}</div>
      ${winBadge(d)}
    </div>
    <div class="balls-row">${balls}</div>
    <div class="jolly-row">
      <span class="jolly-label">🃏 JOLLY</span>
      <div class="ball-jolly">${d.jolly}</div>
      <span class="ss-label">⭐ SUPERSTAR</span>
      <div class="ball-ss">${d.superstar}</div>
    </div>
    ${winDetail(d)}
  </div>`;
}

function renderDraws(draws) {
  document.getElementById('drawsContainer').innerHTML = draws.map(drawCardHtml).join('');
}

// ── STORICO ───────────────────────────────────────────────────────────────
let histFilter = 'all';
function filterHistory(f, btn) {
  histFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory(allDraws);
}

const MONTH_MAP={'jan':'Gennaio','feb':'Febbraio','mar':'Marzo','apr':'Aprile','may':'Maggio','jun':'Giugno','jul':'Luglio'};

function renderHistory(draws) {
  let filtered = draws;
  if(histFilter==='win') filtered=draws.filter(d=>Object.values(d.wins||calcWins(d.numbers)).some(v=>v>0));
  else if(histFilter==='2026') filtered=draws.filter(d=>d.date.includes('2026'));
  else if(MONTH_MAP[histFilter]) filtered=draws.filter(d=>d.date.includes(MONTH_MAP[histFilter]));
  document.getElementById('historyContainer').innerHTML = filtered.length
    ? filtered.map(drawCardHtml).join('')
    : '<div style="text-align:center;color:#3a3a5a;padding:40px;font-family:Cinzel,serif;font-size:12px;letter-spacing:.2em">NESSUNA ESTRAZIONE</div>';
}

// ── STATISTICHE ───────────────────────────────────────────────────────────
function renderStats() {
  const draws=allDraws;
  const tot=draws.length;
  let ambos=0,ternos=0,quaterne=0,wins2tot=0;
  let totVintoSist=0, costo=0;
  const byMonth={};

  for(const d of draws) {
    const w=d.wins||calcWins(d.numbers);
    if(w[2]>0) ambos++;
    if(w[3]>0) ternos++;
    if(w[4]>0) quaterne++;
    for(const [k,v] of Object.entries(w)) {
      if(v>0) {
        const n15=Math.round(v*15/28);
        totVintoSist += n15*QUOTE[parseInt(k)];
      }
    }
    costo += 15;
    const m=d.date.split(' ')[2]||'?';
    if(!byMonth[m]) byMonth[m]={draws:0,wins:0};
    byMonth[m].draws++;
    if(Object.values(w).some(v=>v>0)) byMonth[m].wins++;
  }

  const roi = ((totVintoSist-costo)/costo*100);

  // Calcola frequenza nostri numeri
  const freq={};
  for(const n of OUR) freq[n]=0;
  for(const d of draws) for(const n of d.numbers) if(OUR.includes(n)) freq[n]++;
  const freqSorted=OUR.map(n=>([n,freq[n]])).sort((a,b)=>b[1]-a[1]);

  const html=`
  <div class="stat-grid">
    <div class="stat-box"><div class="stat-num">${tot}</div><div class="stat-label">ESTRAZIONI ANALIZZATE</div></div>
    <div class="stat-box highlight"><div class="stat-num" style="color:#4aff6a">${ambos}</div><div class="stat-label">ESTRAZIONI CON AMBO</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#FFD700">${ternos}</div><div class="stat-label">ESTRAZIONI CON TERNO</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#ff8c00">${quaterne}</div><div class="stat-label">QUATERNE</div></div>
  </div>
  <div class="card" style="margin-bottom:12px">
    <div class="card-title">✦ SIMULAZIONE PREMI (sistema 15 giocate) ✦</div>
    <table class="prize-table">
      <thead><tr><th>CATEGORIA</th><th>N. ESTRAZIONI</th><th>GIOCATE VINTE</th><th>VALORE STIMATO</th></tr></thead>
      <tbody>
        ${[6,5,4,3,2].map(k=>{
          const cnt=draws.filter(d=>(d.wins||calcWins(d.numbers))[k]>0).length;
          const totalCombos=draws.reduce((s,d)=>s+((d.wins||calcWins(d.numbers))[k]||0),0);
          const combos15=Math.round(totalCombos*15/28);
          const val=combos15*QUOTE[k];
          return `<tr class="${cnt>0?'won':''}">
            <td><span class="cat-badge" style="background:${k>=4?'#2a1500':k===3?'#1a1a00':'#001a00'};color:${k>=4?'#ff8c00':k===3?'#FFD700':'#4aff6a'}">${k===2?'AMBO':k===3?'TERNO':k===4?'QUATERNA':k===5?'CINQUINA':'SEI'}</span></td>
            <td>${cnt}</td>
            <td>${combos15}</td>
            <td style="color:${val>0?'#FFD700':'#3a3a5a'}">${val>0?fmt(val):'-'}</td>
          </tr>`;
        }).join('')}
        <tr style="border-top:1px solid #FFD70033">
          <td colspan="3" style="color:#8a7a5a;font-family:Cinzel,serif;font-size:10px;letter-spacing:.1em">TOTALE STIMATO VINTO</td>
          <td style="color:#FFD700;font-weight:700">${fmt(totVintoSist)}</td>
        </tr>
        <tr>
          <td colspan="3" style="color:#8a7a5a;font-family:Cinzel,serif;font-size:10px;letter-spacing:.1em">TOTALE SPESO (€15×${tot})</td>
          <td style="color:#ff6a6a">${fmt(costo)}</td>
        </tr>
        <tr>
          <td colspan="3" style="color:#8a7a5a;font-family:Cinzel,serif;font-size:10px;letter-spacing:.1em">BILANCIO NETTO</td>
          <td style="color:${totVintoSist-costo>=0?'#4aff6a':'#ff6a6a'}">${fmt(totVintoSist-costo)}</td>
        </tr>
      </tbody>
    </table>
    <div style="font-size:10px;color:#3a3a5a;text-align:center;margin-top:8px">*Quote medie indicative. Ambo ~€5, Terno ~€26, Quaterna ~€295</div>
  </div>
  <div class="card">
    <div class="card-title">✦ FREQUENZA NUMERI NOSTRI ✦</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:8px 0">
      ${freqSorted.map(([n,f])=>`
        <div style="text-align:center">
          <div class="ball" style="background:radial-gradient(circle at 35% 35%,#fff5a0,#FFD700 40%,#b8860b 80%);color:#3a2000;width:40px;height:40px;font-size:13px;margin:0 auto 4px">${n}</div>
          <div style="font-family:Cinzel,serif;font-size:10px;color:#FFD700">${f}x</div>
          <div style="font-size:9px;color:#5a5a7a">${(f/tot*100).toFixed(0)}%</div>
        </div>`).join('')}
    </div>
  </div>
  `;
  document.getElementById('statsContainer').innerHTML=html;
}

// ── FONDOCASSA ────────────────────────────────────────────────────────────
let fcType='win', editId=null, editType='win';

function selType(t){fcType=t;document.getElementById('btnWin').className='fc-type-btn'+(t==='win'?' sel-win':'');document.getElementById('btnExp').className='fc-type-btn'+(t==='exp'?' sel-exp':'');}
function selEditType(t){editType=t;document.getElementById('editBtnWin').className='fc-type-btn'+(t==='win'?' sel-win':'');document.getElementById('editBtnExp').className='fc-type-btn'+(t==='exp'?' sel-exp':'');}

async function loadEntries(){try{const r=await fetch(BIN_URL+'/latest',{headers:BIN_HDR});const j=await r.json();return j.record?.entries||[];}catch(e){try{return JSON.parse(localStorage.getItem('fc_entries')||'[]');}catch{return[];}}}
async function saveEntries(e){try{await fetch(BIN_URL,{method:'PUT',headers:BIN_HDR,body:JSON.stringify({entries:e})});}catch{localStorage.setItem('fc_entries',JSON.stringify(e));}}

async function renderFc(){
  const entries=await loadEntries();
  let ent=0,usc=0;
  for(const e of entries){if(e.type==='win')ent+=e.amt;else usc+=e.amt;}
  const saldo=ent-usc;
  const fmtE=n=>'€ '+n.toFixed(2).replace('.',',');
  document.getElementById('fcSaldo').className='saldo-num '+(saldo>=0?'pos':'neg');
  document.getElementById('fcSaldo').textContent=(saldo>=0?'+ ':'')+fmtE(saldo);
  document.getElementById('fcEnt').textContent=fmtE(ent);
  document.getElementById('fcUsc').textContent=fmtE(usc);
  document.getElementById('fcMoves').innerHTML=entries.length?[...entries].reverse().map(e=>`
    <div class="move-item">
      <div class="move-header">
        <div class="move-desc">${e.type==='win'?'💰':'💸'} ${e.desc}</div>
        <div class="move-amt ${e.type==='win'?'pos':'neg'}">${e.type==='win'?'+':'-'} ${fmtE(e.amt)}</div>
      </div>
      ${e.note?`<div class="move-note">${e.note}</div>`:''}
      <div class="move-date">${new Date(e.ts).toLocaleString('it-IT')}</div>
      <div class="move-actions">
        <button class="move-btn" onclick="editEntry('${e.id}')">✏️ Modifica</button>
        <button class="move-btn" onclick="delEntry('${e.id}')">✕ Elimina</button>
      </div>
    </div>`).join('')
    :'<div style="text-align:center;color:#3a3a5a;padding:30px;font-family:Cinzel,serif;font-size:11px;letter-spacing:.15em">NESSUN MOVIMENTO</div>';
}

async function addEntry(){
  const amt=parseFloat(document.getElementById('fcAmt').value)||0;
  const desc=document.getElementById('fcDesc').value.trim();
  const note=document.getElementById('fcNote').value.trim();
  if(!amt||!desc){alert('Inserisci importo e descrizione');return;}
  const entries=await loadEntries();
  entries.push({id:Date.now()+'',type:fcType,amt,desc,note,ts:new Date().toISOString()});
  await saveEntries(entries);
  document.getElementById('fcAmt').value='';
  document.getElementById('fcDesc').value='';
  document.getElementById('fcNote').value='';
  renderFc();
}

async function delEntry(id){
  if(!confirm('Eliminare questo movimento?'))return;
  const entries=await loadEntries();
  await saveEntries(entries.filter(e=>e.id!==id));
  renderFc();
}

async function editEntry(id){
  const entries=await loadEntries();
  const e=entries.find(x=>x.id===id);
  if(!e)return;
  editId=id; editType=e.type;
  document.getElementById('editAmt').value=e.amt;
  document.getElementById('editDesc').value=e.desc;
  document.getElementById('editNote').value=e.note||'';
  selEditType(e.type);
  document.getElementById('editModal').classList.add('open');
}

function closeModal(){document.getElementById('editModal').classList.remove('open');editId=null;}

async function saveEdit(){
  const amt=parseFloat(document.getElementById('editAmt').value)||0;
  const desc=document.getElementById('editDesc').value.trim();
  const note=document.getElementById('editNote').value.trim();
  if(!amt||!desc){alert('Inserisci importo e descrizione');return;}
  const entries=(await loadEntries()).map(e=>e.id===editId?{...e,type:editType,amt,desc,note}:e);
  await saveEntries(entries);
  closeModal();renderFc();
}

// ── NAVIGAZIONE ───────────────────────────────────────────────────────────
function showTab(t){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='fc')renderFc();
  if(t==='stats')renderStats();
  if(t==='history')renderHistory(allDraws);
}

loadData();
</script>
