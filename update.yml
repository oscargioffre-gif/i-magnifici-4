name: Aggiorna Estrazioni SuperEnalotto

on:
  schedule:
    - cron: '30 19 * * 2'
    - cron: '30 19 * * 4'
    - cron: '30 19 * * 5'
    - cron: '30 19 * * 6'
  workflow_dispatch:

jobs:
