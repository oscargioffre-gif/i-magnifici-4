name: Aggiorna estrazioni SuperEnalotto

# ── PIANIFICAZIONE ────────────────────────────────────────────────────────────
# Estrazioni: Mar, Gio, Ven, Sab alle 20:00 ora italiana.
# Aggiornamento: un'ora dopo → 21:00 italiane.
# Il cron di GitHub gira SOLO in UTC e non conosce l'ora legale, quindi servono
# due righe: una copre l'estate (CEST, UTC+2) e una l'inverno (CET, UTC+1).
# La corsa "fuori stagione" è innocua: fetch.py è idempotente e non committa
# se non ci sono novità.
on:
  schedule:
    - cron: '0 19 * * 2,4,5,6'   # 21:00 IT quando è ora legale (CEST)
    - cron: '0 20 * * 2,4,5,6'   # 21:00 IT quando è ora solare (CET)
  workflow_dispatch:             # pulsante "Run workflow" per lanci manuali

# Permesso di scrivere sul repo (necessario per il push di data.json)
permissions:
  contents: write

# Evita che due run si sovrappongano (es. lancio manuale + cron)
concurrency:
  group: aggiorna-estrazioni
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v5          # v5 = niente warning Node 20/24

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4 lxml

      - name: Scarica e aggiorna le estrazioni
        run: python fetch.py

      - name: Commit e push (solo se ci sono novità)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "Nessuna variazione: niente commit."
          else
            git commit -m "Aggiornamento estrazioni $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
