name: Aggiorna SuperEnalotto

on:
  schedule:
    - cron: '15 20 * * 2,4,5,6'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4 lxml

      - name: Scarica estrazioni
        run: python fetch.py

      - name: Commit e push
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Aggiorna estrazioni $(date -u +%Y-%m-%d)"
          git push
