<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#FFD700;--gold-dim:#9B6A00;--gold-light:#FFFACC;
  --cinzel:'Cinzel',serif;--play:'Playfair Display',serif;--corm:'Cormorant Garamond',serif;
}
html,body{
  min-height:100vh;
  background:radial-gradient(ellipse 140% 80% at 50% -5%,#1C0E00 0%,#050508 50%,#00050F 100%);
  color:#fff;font-family:var(--corm);-webkit-font-smoothing:antialiased;overflow-x:hidden;
}
@keyframes twinkle{0%,100%{opacity:.12;transform:scale(1)}50%{opacity:1;transform:scale(1.7)}}
@keyframes floatCrown{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(2deg)}}
@keyframes crownGlow{0%,100%{filter:drop-shadow(0 0 6px rgba(255,215,0,.3))}50%{filter:drop-shadow(0 0 24px rgba(255,215,0,.9)) drop-shadow(0 0 48px rgba(255,160,0,.5))}}
@keyframes shimmerText{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes ballPulse{0%,100%{transform:scale(1);box-shadow:0 0 18px rgba(255,215,0,.7),0 0 36px rgba(255,180,0,.35)}50%{transform:scale(1.1);box-shadow:0 0 30px rgba(255,215,0,1),0 0 60px rgba(255,180,0,.6)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes skeleton{0%{background-position:200% 0}100%{background-position:-200% 0}}

.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:var(--gold);animation:twinkle var(--d) ease-in-out var(--dl) infinite}
.page{max-width:500px;margin:0 auto;padding:0 16px 80px;position:relative;z-index:1}

.header{text-align:center;padding:44px 0 28px}
.crown{font-size:76px;display:inline-block;animation:floatCrown 3.2s ease-in-out infinite,crownGlow 2.5s ease-in-out infinite;margin-bottom:4px;line-height:1}
.title{font-family:var(--cinzel);font-size:clamp(1.8rem,8vw,2.5rem);font-weight:900;background:linear-gradient(105deg,var(--gold-dim) 0%,var(--gold) 28%,var(--gold-light) 48%,var(--gold) 68%,var(--gold-dim) 100%);background-size:220% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmerText 4s linear infinite;letter-spacing:.06em;line-height:1}
.subtitle{font-family:var(--corm);font-style:italic;color:#7a5e20;font-size:.9rem;margin-top:6px;letter-spacing:.18em}
.divider{display:flex;align-items:center;gap:10px;margin-top:18px}
.dl{flex:1;height:1px}.dl.l{background:linear-gradient(to right,transparent,var(--gold))}.dl.r{background:linear-gradient(to left,transparent,var(--gold))}
.gem{color:var(--gold);font-size:14px}

.card{background:linear-gradient(135deg,rgba(255,215,0,.055),rgba(255,215,0,.015));border:1px solid rgba(255,215,0,.18);border-radius:20px;padding:22px 18px;margin-bottom:18px}
.card-lbl{font-family:var(--cinzel);color:var(--gold);font-size:.64rem;letter-spacing:.3em;text-align:center;margin-bottom:16px}

.balls{display:flex;justify-content:center;gap:9px;flex-wrap:wrap}
.ball{width:54px;height:54px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--play);font-weight:800;font-size:1.05rem;transition:all .5s cubic-bezier(.34,1.56,.64,1);user-select:none}
/* Palline nostri numeri (in cima, non estratti) */
.ball.dark{background:radial-gradient(circle at 35% 28%,#2e2e42,#18182a 65%,#0e0e18 90%);color:#9896c0;border:2px solid rgba(120,118,180,.5);box-shadow:inset 0 1px 1px rgba(255,255,255,.06),0 3px 8px rgba(0,0,0,.6)}
/* Palline numeri estratti NON nostri — bianco su grigio scuro, chiari e leggibili */
.ball.dimmed{background:radial-gradient(circle at 35% 28%,#3a3a3a,#222222 65%,#141414 90%);color:#e8e8e8;border:2px solid rgba(180,180,180,.25);box-shadow:inset 0 1px 1px rgba(255,255,255,.08),0 2px 6px rgba(0,0,0,.5)}
/* Palline nostri numeri estratti — oro brillante */
.ball.gold{background:radial-gradient(circle at 35% 28%,#FFFCE0,#FFD700 42%,#9B6A00 85%);color:#3D1A00;border:2px solid rgba(255,220,50,.8);box-shadow:0 0 18px rgba(255,215,0,.7),0 0 36px rgba(255,180,0,.35),inset 0 1px 2px rgba(255,255,255,.5);animation:ballPulse 1.6s ease-in-out infinite}
.ball.sm{width:42px;height:42px;font-size:.82rem}
.ball.xs{width:34px;height:34px;font-size:.72rem}
.skel{width:54px;height:54px;border-radius:50%;flex-shrink:0;background:linear-gradient(90deg,#1a1a2a 25%,#252535 50%,#1a1a2a 75%);background-size:200% 100%;animation:skeleton 1.4s ease-in-out infinite;border:2px solid #1a1a28}

.loader{text-align:center;padding:40px 0;animation:fadeUp .5s ease}
.spinner{width:52px;height:52px;border-radius:50%;margin:0 auto 18px;border:3px solid rgba(255,215,0,.12);border-top-color:var(--gold);animation:spin 1s linear infinite}
.loader-txt{font-family:var(--corm);font-style:italic;color:#7a5e20;font-size:.9rem;letter-spacing:.12em}

.info{background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.15);border-radius:14px;padding:16px 18px;margin-bottom:16px;text-align:center;animation:fadeUp .4s ease}
.info p{color:#7a5e20;font-size:.85rem;font-family:var(--corm);font-style:italic;line-height:1.6}
.info strong{color:#C9A84C;font-style:normal}

.err{background:rgba(180,30,30,.08);border:1px solid rgba(180,30,30,.3);border-radius:16px;padding:22px;text-align:center;animation:fadeUp .4s ease;margin-bottom:16px}
.err p{color:#cc5555;font-size:.95rem;margin-bottom:16px;font-family:var(--corm)}

.draw{border-radius:18px;overflow:hidden;margin-bottom:14px;border:1px solid rgba(255,215,0,.1);background:rgba(10,10,16,.8);cursor:pointer;transition:border-color .3s;animation:fadeUp .5s ease}
.draw.open{border-color:rgba(255,215,0,.3)}
.draw.w2{background:linear-gradient(135deg,#0d0d1a 0%,#110e00 100%)}
.draw.w3{background:linear-gradient(135deg,#0d0d1a 0%,#1a1500 100%)}
.draw.w4{background:linear-gradient(135deg,#0d0d1a 0%,#2a1f00 100%)}
.draw.w5{background:linear-gradient(135deg,#0d0d1a 0%,#3a2a00 100%)}
.draw.w6{background:linear-gradient(135deg,#5C3A00 0%,#FFD700 50%,#5C3A00 100%)}
.draw-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px}
.draw-date{font-family:var(--cinzel);font-size:.7rem;letter-spacing:.2em;color:#A08040}
.draw.open .draw-date{color:var(--gold)}
.draw-sub{color:#555;font-size:.64rem;margin-top:3px;font-style:italic}
.badge{font-family:var(--cinzel);font-size:.7rem;font-weight:700;letter-spacing:.05em;color:var(--gold)}
.badge.none{color:#444;font-style:italic;font-family:var(--corm);font-weight:400;font-size:.72rem}
.arr{color:rgba(255,215,0,.5);font-size:10px;margin-left:8px}
.draw-bd{padding:0 20px 22px;animation:fadeUp .3s ease}
.sep{height:1px;background:linear-gradient(to right,transparent,rgba(255,215,0,.2),transparent);margin-bottom:18px}
.sec-lbl{font-family:var(--cinzel);color:#7a5e20;font-size:.62rem;letter-spacing:.25em;text-align:center;margin-bottom:12px}
.extras{display:flex;justify-content:center;gap:24px;margin-bottom:18px}
.extra{text-align:center}
.extra-lbl{font-family:var(--cinzel);color:#7a5e20;font-size:.58rem;letter-spacing:.18em;margin-bottom:8px}
.res{border-radius:12px;padding:16px 18px;text-align:center;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.04)}
.res.won{border-color:rgba(255,215,0,.2)}
.res-prize{font-family:var(--cinzel);font-weight:900;letter-spacing:.04em;font-size:1.3rem;margin-bottom:6px}
.res-prize.s{font-size:.9rem;color:#444!important}
.res-count{font-family:var(--corm);font-style:italic;font-size:.85rem;margin-bottom:10px}
.jkp{text-align:center;color:#3a2e10;font-size:.68rem;font-style:italic;margin-top:12px}

.btn{display:block;margin:28px auto 0;background:linear-gradient(135deg,#5C3A00,#FFD700,#5C3A00);border:none;border-radius:50px;padding:13px 36px;font-family:var(--cinzel);font-weight:700;font-size:.78rem;letter-spacing:.18em;color:#3D1A00;cursor:pointer;box-shadow:0 0 20px rgba(255,215,0,.25);transition:transform .15s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:default}
.upd{text-align:center;color:#2a2820;font-size:.68rem;font-style:italic;margin-top:10px}
.footer{text-align:center;margin-top:44px;color:#1a1810;font-size:.68rem;font-style:italic;letter-spacing:.1em}

::-webkit-scrollbar{width:3px;background:#050508}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* ── Bottom nav ── */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;background:#05050A;border-top:1px solid rgba(255,215,0,.15);backdrop-filter:blur(12px)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 14px;cursor:pointer;gap:4px;transition:all .2s;-webkit-tap-highlight-color:transparent;border:none;background:transparent}
.nav-tab.active .nav-icon{color:var(--gold);filter:drop-shadow(0 0 6px rgba(255,215,0,.6))}
.nav-tab.active .nav-lbl{color:var(--gold)}
.nav-icon{font-size:22px;transition:all .2s;color:#444}
.nav-lbl{font-family:var(--cinzel);font-size:.52rem;letter-spacing:.15em;color:#444;transition:all .2s}

/* ── Fondocassa page ── */
.fc-page{display:none}
.fc-page.active{display:block}
.draws-page{display:block}
.draws-page.hidden{display:none}

/* Saldo totale */
.fc-saldo{border-radius:20px;padding:24px 20px;margin-bottom:18px;text-align:center;background:linear-gradient(135deg,rgba(255,215,0,.07),rgba(255,215,0,.02));border:1px solid rgba(255,215,0,.2)}
.fc-saldo-lbl{font-family:var(--cinzel);color:#7a5e20;font-size:.65rem;letter-spacing:.3em;margin-bottom:8px}
.fc-saldo-val{font-family:var(--play);font-size:2.8rem;font-weight:900;letter-spacing:-.02em;line-height:1}
.fc-saldo-val.pos{color:#4ADE80}
.fc-saldo-val.neg{color:#F87171}
.fc-saldo-val.zero{color:#7a5e20}
.fc-stats{display:flex;gap:12px;margin-top:14px}
.fc-stat{flex:1;background:rgba(0,0,0,.3);border-radius:12px;padding:10px;text-align:center}
.fc-stat-lbl{font-family:var(--cinzel);font-size:.55rem;letter-spacing:.15em;margin-bottom:4px}
.fc-stat-lbl.g{color:#4ADE80}.fc-stat-lbl.r{color:#F87171}
.fc-stat-val{font-family:var(--play);font-size:1.1rem;font-weight:800}
.fc-stat-val.g{color:#4ADE80}.fc-stat-val.r{color:#F87171}

/* Add entry form */
.fc-form{background:linear-gradient(135deg,rgba(255,215,0,.05),rgba(255,215,0,.01));border:1px solid rgba(255,215,0,.15);border-radius:20px;padding:20px 18px;margin-bottom:18px}
.fc-form-lbl{font-family:var(--cinzel);color:var(--gold);font-size:.64rem;letter-spacing:.3em;text-align:center;margin-bottom:16px}
.fc-type-row{display:flex;gap:8px;margin-bottom:14px}
.fc-type-btn{flex:1;padding:10px;border-radius:50px;border:1px solid rgba(255,215,0,.2);background:transparent;font-family:var(--cinzel);font-size:.65rem;letter-spacing:.1em;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.fc-type-btn.sel-win{background:rgba(74,222,128,.15);border-color:#4ADE80;color:#4ADE80}
.fc-type-btn.sel-exp{background:rgba(248,113,113,.12);border-color:#F87171;color:#F87171}
.fc-type-btn:not(.sel-win):not(.sel-exp){color:#555}
.fc-input-row{display:flex;gap:8px;margin-bottom:10px}
.fc-input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,215,0,.15);border-radius:12px;padding:11px 14px;color:#fff;font-family:var(--corm);font-size:.95rem;outline:none;transition:border-color .2s;width:100%}
.fc-input:focus{border-color:rgba(255,215,0,.45)}
.fc-input::placeholder{color:#444}
.fc-input-amt{width:120px;flex:0 0 120px;font-family:var(--play);font-weight:700;font-size:1rem}
.fc-add-btn{width:100%;padding:12px;border-radius:50px;background:linear-gradient(135deg,#5C3A00,#FFD700,#5C3A00);border:none;font-family:var(--cinzel);font-weight:700;font-size:.72rem;letter-spacing:.18em;color:#3D1A00;cursor:pointer;transition:transform .15s;-webkit-tap-highlight-color:transparent;margin-top:4px}
.fc-add-btn:active{transform:scale(.97)}

/* Entries list */
.fc-entries-lbl{font-family:var(--cinzel);color:#7a5e20;font-size:.62rem;letter-spacing:.25em;margin-bottom:12px;padding-left:2px}
.fc-entry{border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;animation:fadeUp .3s ease;position:relative;overflow:hidden}
.fc-entry.win{background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.18)}
.fc-entry.exp{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.18)}
.fc-entry-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.fc-entry-body{flex:1;min-width:0}
.fc-entry-desc{font-family:var(--corm);font-size:.95rem;color:#ccc;line-height:1.35;word-break:break-word}
.fc-entry-note{font-family:var(--corm);font-style:italic;font-size:.8rem;color:#666;margin-top:3px;line-height:1.3}
.fc-entry-date{font-family:var(--cinzel);font-size:.55rem;letter-spacing:.1em;color:#444;margin-top:5px}
.fc-entry-amt{font-family:var(--play);font-weight:900;font-size:1.1rem;flex-shrink:0;margin-top:1px}
.fc-entry.win .fc-entry-amt{color:#4ADE80}
.fc-entry.exp .fc-entry-amt{color:#F87171}
.fc-entry-actions{display:flex;gap:6px;margin-top:8px}
.fc-act-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:4px 12px;font-family:var(--cinzel);font-size:.55rem;letter-spacing:.08em;cursor:pointer;color:#666;transition:all .2s;-webkit-tap-highlight-color:transparent}
.fc-act-btn:active{transform:scale(.95)}
.fc-act-btn.edit{color:#C9A84C;border-color:rgba(201,168,76,.3)}
.fc-act-btn.del{color:#F87171;border-color:rgba(248,113,113,.25)}
.fc-empty{text-align:center;padding:32px 0;font-family:var(--corm);font-style:italic;color:#333;font-size:.9rem}

/* Edit modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);animation:fadeUp .2s ease}
.modal{background:#0d0d14;border:1px solid rgba(255,215,0,.2);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:500px}
.modal-title{font-family:var(--cinzel);color:var(--gold);font-size:.72rem;letter-spacing:.25em;text-align:center;margin-bottom:18px}
.modal-close{position:absolute;top:16px;right:20px;background:transparent;border:none;color:#555;font-size:20px;cursor:pointer;-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="page">

  <!-- ══ ESTRAZIONI PAGE ══ -->
  <div class="draws-page" id="drawsPage">
    <div class="header">
      <div class="crown">👑</div>
      <h1 class="title">I MAGNIFICI 4</h1>
      <p class="subtitle">SuperEnalotto · Controllo Automatico</p>
      <div class="divider">
        <div class="dl l"></div><div class="gem">✦</div><div class="dl r"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-lbl">✦ I NOSTRI NUMERI FORTUNATI ✦</div>
      <div class="balls" id="ourNums"></div>
    </div>
    <div id="content"></div>
    <button class="btn" id="refreshBtn" onclick="loadDraws()">✦ AGGIORNA ✦</button>
    <div class="upd" id="upd"></div>
    <p class="footer">Estrazioni · Martedì · Giovedì · Venerdì · Sabato · ore 20:00</p>
  </div>

  <!-- ══ FONDOCASSA PAGE ══ -->
  <div class="fc-page" id="fcPage">
    <div class="header" style="padding-top:36px;padding-bottom:20px">
      <div style="font-size:52px;line-height:1;margin-bottom:6px">€</div>
      <h1 class="title">FONDOCASSA</h1>
      <p class="subtitle">Vincite · Spese · Note</p>
      <div class="divider">
        <div class="dl l"></div><div class="gem">✦</div><div class="dl r"></div>
      </div>
    </div>

    <!-- Saldo -->
    <div class="fc-saldo">
      <div class="fc-saldo-lbl">✦ SALDO ✦</div>
      <div class="fc-saldo-val" id="fcSaldo">€ 0,00</div>
      <div class="fc-stats">
        <div class="fc-stat">
          <div class="fc-stat-lbl g">ENTRATE</div>
          <div class="fc-stat-val g" id="fcTotWin">€ 0,00</div>
        </div>
        <div class="fc-stat">
          <div class="fc-stat-lbl r">USCITE</div>
          <div class="fc-stat-val r" id="fcTotExp">€ 0,00</div>
        </div>
      </div>
    </div>

    <!-- Form aggiungi -->
    <div class="fc-form">
      <div class="fc-form-lbl">✦ AGGIUNGI VOCE ✦</div>
      <div class="fc-type-row">
        <button class="fc-type-btn sel-win" id="btnWin" onclick="selType('win')">▲ VINCITA</button>
        <button class="fc-type-btn" id="btnExp" onclick="selType('exp')">▼ SPESA</button>
      </div>
      <div class="fc-input-row">
        <input class="fc-input fc-input-amt" type="number" id="fcAmt" placeholder="0,00" min="0" step="0.01">
        <input class="fc-input" type="text" id="fcDesc" placeholder="Descrizione (es. Ambo 7 marzo)">
      </div>
      <input class="fc-input" type="text" id="fcNote" placeholder="Note aggiuntive (opzionale)" style="margin-bottom:10px">
      <button class="fc-add-btn" onclick="addEntry()">✦ AGGIUNGI ✦</button>
    </div>

    <!-- Lista voci -->
    <div class="fc-entries-lbl">✦ MOVIMENTI ✦</div>
    <div id="fcList"></div>
  </div>

</div>

<!-- Bottom nav -->
<nav class="nav">
  <button class="nav-tab active" id="tabDraws" onclick="showTab('draws')">
    <div class="nav-icon">🎰</div>
    <div class="nav-lbl">ESTRAZIONI</div>
  </button>
  <button class="nav-tab" id="tabFc" onclick="showTab('fc')">
    <div class="nav-icon">€</div>
    <div class="nav-lbl">FONDOCASSA</div>
  </button>
</nav>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal" style="display:none">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">✦ MODIFICA VOCE ✦</div>
    <div class="fc-type-row">
      <button class="fc-type-btn" id="editBtnWin" onclick="selEditType('win')">▲ VINCITA</button>
      <button class="fc-type-btn" id="editBtnExp" onclick="selEditType('exp')">▼ SPESA</button>
    </div>
    <div class="fc-input-row">
      <input class="fc-input fc-input-amt" type="number" id="editAmt" placeholder="0,00" min="0" step="0.01">
      <input class="fc-input" type="text" id="editDesc" placeholder="Descrizione">
    </div>
    <input class="fc-input" type="text" id="editNote" placeholder="Note aggiuntive" style="margin-bottom:12px">
    <button class="fc-add-btn" onclick="saveEdit()">✦ SALVA ✦</button>
  </div>
</div>

<script>
const OUR=[3,7,12,22,25,26,46,79];
const PRIZES={
  6:{label:"HAI FATTO SEI!",emoji:"🏆",color:"#FFD700",cls:"w6"},
  5:{label:"CINQUINA!",     emoji:"🌟",color:"#FFD700",cls:"w5"},
  4:{label:"QUATERNA!",     emoji:"💎",color:"#E8C77A",cls:"w4"},
  3:{label:"TERNO!",        emoji:"✨",color:"#C9A84C",cls:"w3"},
  2:{label:"AMBO!",         emoji:"🎯",color:"#B8954A",cls:"w2"},
  1:{label:"NON HAI VINTO", emoji:"😔",color:"#555",   cls:""},
  0:{label:"NON HAI VINTO", emoji:"😔",color:"#555",   cls:""},
};
let draws=[],openIdx=0;

// Stars
(()=>{
  const c=document.getElementById("stars");
  for(let i=0;i<32;i++){
    const d=document.createElement("div");d.className="star";
    const s=1+(i%3);
    d.style.cssText=`width:${s}px;height:${s}px;left:${(i*37+11)%100}%;top:${(i*53+7)%100}%;--d:${2.5+(i%3)}s;--dl:${(i*.4)%3}s`;
    c.appendChild(d);
  }
})();

function renderOur(matched=[]){
  document.getElementById("ourNums").innerHTML=
    OUR.map(n=>`<div class="ball ${matched.includes(n)?'gold':'dark'}">${n}</div>`).join("");
}
renderOur();

function b(n,gold,sz=""){return`<div class="ball ${gold?'gold':'dimmed'} ${sz}">${n}</div>`}

function renderDraws(){
  if(!draws.length){
    document.getElementById("content").innerHTML=`
      <div class="info">
        <p>📅 I dati si aggiornano automaticamente ogni<br>
        <strong>Martedì, Giovedì, Venerdì e Sabato</strong><br>
        dopo le ore 20:30.<br><br>
        Se è giorno di estrazione, riprova tra qualche ora!</p>
      </div>`;
    return;
  }
  const open=draws[openIdx];
  if(open)renderOur(open.numbers||[]);

  document.getElementById("content").innerHTML=draws.map((d,i)=>{
    const matched=OUR.filter(n=>d.numbers?.includes(n));
    const jollyM=d.jolly&&OUR.includes(d.jolly);
    const ssM=d.superstar&&OUR.includes(d.superstar);
    const cnt=matched.length;
    const prize=PRIZES[Math.min(cnt,6)];
    const isOpen=i===openIdx;
    const winCls=cnt>=2?prize.cls:"";

    const badge=cnt>=2
      ?`<span class="badge">${prize.emoji} ${prize.label}</span>`
      :`<span class="badge none">${cnt===1?"1 numero":"nessuno"}</span>`;

    const numBalls=(d.numbers||[]).map(n=>b(n,OUR.includes(n),"sm")).join("");
    const matchBalls=[
      ...matched.map(n=>b(n,true,"xs")),
      jollyM?b(d.jolly,true,"xs"):"",
      ssM?b(d.superstar,true,"xs"):"",
    ].join("");

    const body=isOpen?`
      <div class="draw-bd">
        <div class="sep"></div>
        <div class="sec-lbl">NUMERI ESTRATTI</div>
        <div class="balls" style="margin-bottom:16px">${numBalls}</div>
        ${(d.jolly||d.superstar)?`<div class="extras">
          ${d.jolly?`<div class="extra"><div class="extra-lbl">🃏 JOLLY</div>${b(d.jolly,jollyM,"sm")}</div>`:""}
          ${d.superstar?`<div class="extra"><div class="extra-lbl">⭐ SUPERSTAR</div>${b(d.superstar,ssM,"sm")}</div>`:""}
        </div>`:""}
        <div class="res ${cnt>=2?"won":""}">
          <div class="res-prize ${cnt>=2?"":"s"}" style="color:${prize.color}">${prize.emoji} ${prize.label}</div>
          ${cnt>0?`<div class="res-count" style="color:${cnt>=2?"#C9A84C":"#555"}">${cnt} ${cnt===1?"numero indovinato":"numeri indovinati"}</div>`:""}
          ${(cnt>0||jollyM||ssM)?`<div class="balls" style="justify-content:center">${matchBalls}</div>`:""}
          ${cnt===0&&!jollyM&&!ssM?`<div class="res-count" style="color:#444">Nessuno dei nostri numeri è uscito</div>`:""}
        </div>
        ${d.jackpot?`<div class="jkp">Jackpot: ${d.jackpot}</div>`:""}
      </div>`:"";

    return`<div class="draw ${isOpen?"open "+winCls:""}" onclick="toggle(${i})">
      <div class="draw-hd">
        <div>
          <div class="draw-date">${d.date||"—"}</div>
        </div>
        <div style="display:flex;align-items:center">${badge}<span class="arr">${isOpen?"▲":"▼"}</span></div>
      </div>${body}
    </div>`;
  }).join("");
}

function toggle(i){openIdx=i;renderDraws()}

async function loadDraws(){
  const btn=document.getElementById("refreshBtn");
  btn.disabled=true;
  renderOur([]);
  document.getElementById("content").innerHTML=`
    <div class="loader">
      <div class="spinner"></div>
      <div class="loader-txt">Caricamento…</div>
      <div class="balls" style="margin-top:20px">
        ${[...Array(6)].map(()=>'<div class="skel"></div>').join("")}
      </div>
    </div>`;

  // Dati incorporati — aggiornati automaticamente da GitHub Actions

  try{

const JSONBIN_ID  = '69aec110d0ea881f4000406f';
const JSONBIN_KEY = '$2a$10$f2iA6J880d8m8094Xz02x.bOCZJD3DRmlwVFnLluYcC7FI0LX94UO';
const BIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;
const BIN_HDR = {'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY};

async function loadEntries(){
  try{
    const r = await fetch(BIN_URL+'/latest', {headers:BIN_HDR});
    const j = await r.json();
    return j.record?.entries || [];
  }catch(e){
    try{ return JSON.parse(localStorage.getItem('fc_entries')||'[]'); }catch(e2){return[];}
  }
}

async function saveEntries(entries){
  try{
    await fetch(BIN_URL, {method:'PUT', headers:BIN_HDR, body:JSON.stringify({entries})});
  }catch(e){
    localStorage.setItem('fc_entries', JSON.stringify(entries));
  }
}

let fcType = 'win', editId = null, editType = 'win';

function selType(t){
  fcType = t;
  document.getElementById('btnWin').className = 'fc-type-btn' + (t==='win'?' sel-win':'');
  document.getElementById('btnExp').className = 'fc-type-btn' + (t==='exp'?' sel-exp':'');
}

function selEditType(t){
  editType = t;
  document.getElementById('editBtnWin').className = 'fc-type-btn' + (t==='win'?' sel-win':'');
  document.getElementById('editBtnExp').className = 'fc-type-btn' + (t==='exp'?' sel-exp':'');
}

function fmt(n){ return '€ '+Math.abs(n).toFixed(2).replace('.',','); }

async function renderFc(){
  const entries = await loadEntries();
  let totWin=0, totExp=0;
  entries.forEach(e=>{ if(e.type==='win') totWin+=e.amt; else totExp+=e.amt; });
  const saldo = totWin - totExp;

  const sEl = document.getElementById('fcSaldo');
  sEl.textContent = (saldo>=0?'+ ':'-  ') + fmt(saldo);
  sEl.className = 'fc-saldo-val ' + (saldo>0?'pos':saldo<0?'neg':'zero');
  document.getElementById('fcTotWin').textContent = fmt(totWin);
  document.getElementById('fcTotExp').textContent = fmt(totExp);

  const list = document.getElementById('fcList');
  if(!entries.length){
    list.innerHTML = '<div class="fc-empty">Nessun movimento ancora.<br>Aggiungi vincite e spese!</div>';
    return;
  }
  list.innerHTML = [...entries].reverse().map(e=>`
    <div class="fc-entry ${e.type}">
      <div class="fc-entry-icon">${e.type==='win'?'💰':'💸'}</div>
      <div class="fc-entry-body">
        <div class="fc-entry-desc">${esc(e.desc||'—')}</div>
        ${e.note?`<div class="fc-entry-note">${esc(e.note)}</div>`:''}
        <div class="fc-entry-date">${e.date}</div>
        <div class="fc-entry-actions">
          <button class="fc-act-btn edit" onclick="openEdit('${e.id}')">✎ Modifica</button>
          <button class="fc-act-btn del"  onclick="delEntry('${e.id}')">✕ Elimina</button>
        </div>
      </div>
      <div class="fc-entry-amt">${e.type==='win'?'+ ':'-  '}${fmt(e.amt)}</div>
    </div>`).join('');
}

function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

async function addEntry(){
  const amt  = parseFloat(document.getElementById('fcAmt').value);
  const desc = document.getElementById('fcDesc').value.trim();
  const note = document.getElementById('fcNote').value.trim();
  if(isNaN(amt)||amt<=0){ alert('Inserisci un importo valido'); return; }

  const entries = await loadEntries();
  entries.push({
    id:   Date.now().toString(),
    type: fcType,
    amt,
    desc: desc || (fcType==='win'?'Vincita':'Spesa'),
    note,
    date: new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
  });
  await saveEntries(entries);

  document.getElementById('fcAmt').value  = '';
  document.getElementById('fcDesc').value = '';
  document.getElementById('fcNote').value = '';
  renderFc();
}

async function delEntry(id){
  if(!confirm('Eliminare questa voce?')) return;
  const all = await loadEntries();
  await saveEntries(all.filter(e=>e.id!==id));
  renderFc();
}

function openEdit(id){
  const entry = loadEntries().find(e=>e.id===id);
  if(!entry) return;
  editId = id;
  editType = entry.type;
  document.getElementById('editAmt').value  = entry.amt;
  document.getElementById('editDesc').value = entry.desc;
  document.getElementById('editNote').value = entry.note||'';
  selEditType(entry.type);
  document.getElementById('editModal').style.display = 'flex';
}

async function saveEdit(){
  const amt  = parseFloat(document.getElementById('editAmt').value);
  const desc = document.getElementById('editDesc').value.trim();
  const note = document.getElementById('editNote').value.trim();
  if(isNaN(amt)||amt<=0){ alert('Importo non valido'); return; }
  const entries = (await loadEntries()).map(e=>
    e.id===editId ? {...e, type:editType, amt, desc:desc||e.desc, note} : e
  );
  await saveEntries(entries);
  closeModal();
  renderFc();
}

function closeModal(){
  document.getElementById('editModal').style.display='none';
  editId=null;
}

// chiudi modal cliccando fuori
document.getElementById('editModal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});
